name : Deploy React Vite App

on:
    push:
        branches:
            - main
            
jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
          - name : Checkout Code
            uses: actions/checkout@v4  

          - name : Login to Docker Hub
            uses : docker/login-action@v3
            with:
              username: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}

          - name: Create .env file
            run: |
                echo "VITE_API_URL=${{ secrets.REACT_APP_API_URL }}" >> .env
                echo "VITE_SOME_OTHER_KEY=${{ secrets.OTHER_SECRET }}" >> .env

          - name : Build and push Docker Image
            uses: docker/build-push-action@v5
            with:
             context: .
             push: true
             tags: venuradenethpriya/ecom:latest

          - name: Deploy to EC2
            uses: appleboy/ssh-action@v1.0.3
            with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USERNAME }}
                key: ${{ secrets.EC2_SSH_KEY }}
                script: |
                    cd /home/ubuntu/e-commerce-site/Frontend
                    
                    docker pull venuradenethpriya/ecom:latest

                    docker compose down
                    docker compose up -d