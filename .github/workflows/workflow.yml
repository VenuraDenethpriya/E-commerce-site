name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted
    
    # This tells all 'run' steps to execute inside the Backend folder
    defaults:
      run:
        working-directory: ./Backend

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        # Explicitly tell the cache where your lockfile is located
        cache-dependency-path: './Backend/package-lock.json' 
        
    - run: npm ci
    
    - name: Create Env File
      run: |
        touch .env
        echo "${{ secrets.PROD_ENV_FILE }}" > .env
        
    - name: Restart PM2
      # Note: Make sure 'BackendAPI' matches the exact name you used when you first started pm2
      run: pm2 restart BackendAPI