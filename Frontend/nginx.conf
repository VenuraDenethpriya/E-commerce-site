server {
    listen 80;
    
    # Where Nginx should look for your static files
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # The SPA fix:
        # 1. Try to find the exact file requested ($uri)
        # 2. Try to find a directory matching the request ($uri/)
        # 3. If neither exists, fallback to index.html so React Router can take over
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets to improve performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}